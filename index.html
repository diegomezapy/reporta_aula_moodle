<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reporta Aula Moodle</title>
    <link rel="stylesheet" href="app/static/styles.css?v=20260611-gas-loader" />
  </head>
  <body>
    <main id="boot" class="shell">
      <header class="topbar">
        <div>
          <h1>Reporta Aula Moodle</h1>
          <p>Cargando tablero...</p>
        </div>
        <span class="pill muted">GitHub Pages</span>
      </header>
    </main>
    <script>
      (() => {
        const GAS_REPORT_URL = "https://script.google.com/macros/s/AKfycbzzr2X40ajp0AlTeD4jbHNZzsugkGeHzVtEa_s73kZTJQhQuCe0FrHaLg0PAwu7vHa-qg/exec";
        const nativeFetch = window.fetch.bind(window);
        const state = {
          report: null,
          automation: {
            enabled: true,
            interval_minutes: 10080,
            sync_to_google: true,
            include_tutor_participation: true,
            notes: "Revision semanal de participacion y riesgo academico.",
            next_run_at: new Date(Date.now() + 7 * 86400000).toISOString(),
          },
        };

        function json(payload, status = 200) {
          return new Response(JSON.stringify(payload), {
            status,
            headers: { "Content-Type": "application/json; charset=utf-8" },
          });
        }

        function first(...values) {
          return values.find((value) => value !== undefined && value !== null && value !== "");
        }

        function asNumber(value, fallback = 0) {
          const n = Number(value);
          return Number.isFinite(n) ? n : fallback;
        }

        function riskLevel(probability) {
          if (probability >= 0.7) return "Critico";
          if (probability >= 0.5) return "Alto";
          if (probability >= 0.3) return "Medio";
          return "Bajo";
        }

        function platformLevel(actions) {
          if (actions >= 15) return "Alta";
          if (actions >= 6) return "Media";
          if (actions > 0) return "Baja";
          return "Sin evidencia";
        }

        function evaluativeLevel(grades) {
          if (grades >= 3) return "Alta";
          if (grades >= 1) return "Media";
          return "Sin evaluaciones";
        }

        function normalizeFactors(value) {
          if (Array.isArray(value)) return value.filter(Boolean);
          return String(value || "")
            .split(/;|,/)
            .map((item) => item.trim())
            .filter(Boolean);
        }

        function localRows() {
          return [
            ["demo-01", "Estudiante 01", 6, 1, 1, 3],
            ["demo-02", "Estudiante 02", 11, 7, 3, 8],
            ["demo-03", "Estudiante 03", 5, 2, 1, 32],
            ["demo-04", "Estudiante 04", 0, 0, 0, 72],
            ["demo-05", "Estudiante 05", 6, 1, 1, 49],
            ["demo-06", "Estudiante 06", 2, 0, 0, 82],
            ["demo-07", "Estudiante 07", 17, 9, 3, 3],
            ["demo-08", "Estudiante 08", 6, 0, 0, 66],
            ["demo-09", "Estudiante 09", 20, 9, 3, 7],
            ["demo-10", "Estudiante 10", 10, 2, 1, 1],
            ["demo-11", "Estudiante 11", 1, 0, 0, 64],
            ["demo-12", "Estudiante 12", 2, 0, 0, 57],
            ["demo-13", "Estudiante 13", 15, 0, 1, 15],
            ["demo-14", "Estudiante 14", 18, 7, 3, 0],
            ["demo-15", "Estudiante 15", 23, 20, 3, 2],
            ["demo-16", "Estudiante 16", 13, 9, 2, 50],
            ["demo-17", "Estudiante 17", 7, 2, 1, 67],
            ["demo-18", "Estudiante 18", 16, 3, 1, 3],
            ["demo-19", "Estudiante 19", 0, 0, 0, 88],
            ["demo-20", "Estudiante 20", 8, 2, 1, 18],
          ].map(([userId, name, actions, forums, grades, days]) => ({ userId, name, actions, forums, grades, days_since_last_access: days }));
        }

        function normalizeSummary(row, index) {
          const actions = asNumber(first(row.actions, row.actions_registered, row.total_actions), 0);
          const forums = asNumber(first(row.forums, row.forum_posts), 0);
          const grades = asNumber(first(row.grades, row.grade_cells_with_value), 0);
          const days = asNumber(first(row.days_since_last_access, row.days_from_last_access, row.days_without_access), 0);
          const prior = asNumber(first(row.prior, row.bayesian_prior_probability), 0.2);
          let posterior = asNumber(first(row.posterior, row.bayesian_posterior_probability, row.desertion_probability), NaN);
          const factors = normalizeFactors(first(row.evidence, row.bayesian_evidence_factors, row.desertion_risk_factors));
          if (!Number.isFinite(posterior)) {
            const evidenceWeight = (days >= 45 ? 0.22 : days <= 7 ? -0.1 : 0) + (actions === 0 ? 0.25 : actions < 5 ? 0.12 : -0.05) + (grades === 0 ? 0.2 : -0.05) + (forums === 0 ? 0.08 : -0.03);
            posterior = Math.max(0.02, Math.min(0.95, prior + evidenceWeight));
          }
          if (!factors.length) {
            if (days >= 45) factors.push("Ultimo acceso prolongado");
            if (actions === 0) factors.push("Sin actividad en plataforma");
            if (grades === 0) factors.push("Sin evaluaciones registradas");
            if (!factors.length) factors.push("Participacion registrada");
          }
          const level = first(row.riskLevel, row.desertion_risk_level, riskLevel(posterior));
          return {
            user_id: first(row.user_id, row.userId, `demo-${String(index + 1).padStart(2, "0")}`),
            name: first(row.name, row.nombre, `Estudiante ${index + 1}`),
            email: first(row.email, row.correo, ""),
            last_access: first(row.last_access, row.ultimo_acceso_curso, days ? `${days} dias desde ultimo acceso` : "Sin dato"),
            days_since_last_access: days,
            actions_registered: actions,
            forum_posts: forums,
            grade_cells_with_value: grades,
            course_total: first(row.course_total, row.total_curso, "-"),
            platform_level: first(row.platform_level, platformLevel(actions)),
            evaluative_level: first(row.evaluative_level, evaluativeLevel(grades)),
            desertion_probability: posterior,
            desertion_risk_level: level,
            desertion_risk_factors: factors,
            follow_up_alert: first(row.follow_up_alert, ["Critico", "Alto"].includes(level) || days >= 45 || actions === 0),
            bayesian_prior_probability: prior,
            bayesian_posterior_probability: posterior,
            bayesian_log_likelihood_ratio: first(row.logLr, row.bayesian_log_likelihood_ratio, "0.00"),
            bayesian_evidence_factors: factors,
            risk_model_version: first(row.risk_model_version, "bayes_lr_expert_v0.1"),
            tutor_activity_signal: first(row.tutor_activity_signal, "Seguimiento semanal"),
          };
        }

        function normalizeReport(payload) {
          const source = payload && payload.report ? payload.report : payload || {};
          const rawRows = source.summaries && source.summaries.length ? source.summaries : localRows();
          const summaries = rawRows.map(normalizeSummary);
          const totalActions = summaries.reduce((sum, row) => sum + row.actions_registered, 0);
          const totalForums = summaries.reduce((sum, row) => sum + row.forum_posts, 0);
          return {
            run_id: first(source.runId, source.run_id, "gas-public-demo"),
            course_title: first(source.courseTitle, source.course_title, "Analitica de Big Data - tablero publico"),
            course_id: first(source.courseId, source.course_id, "1718"),
            generated_at: first(source.generatedAt, source.generated_at, new Date().toISOString()),
            moodle_base_url: first(source.moodle_base_url, "https://www.virtual.facen.una.py/gradofacen"),
            participants_count: summaries.length,
            summaries,
            activity_summary: [
              { activity_name: "Foro Actividad 2 - Unidad 1", action: "post", count: 36 },
              { activity_name: "Foro Actividad 2.2 - Unidad 2", action: "post", count: 22 },
              { activity_name: "Foro de la Unidad 3", action: "post", count: 6 },
              { activity_name: "Entrega primer parcial", action: "submitted", count: 7 },
              { activity_name: "Accesos a materiales", action: "viewed", count: Math.max(1, totalActions - totalForums) },
            ],
            tutor_summary: { active_tutors: 1, actions_registered: 42, forum_posts: 9, activity_coverage: 0.82, participation_level: "Alta" },
            tutor_activity_summary: [
              { activity_name: "Seguimiento semanal", action: "reviewed", count: 20 },
              { activity_name: "Mensajes personalizados", action: "sent", count: 8 },
              { activity_name: "Foro novedades", action: "posted", count: 2 },
            ],
            files: ["reporte_aula_moodle.xlsx", "resumen_estudiantes.csv", "riesgo_desercion.csv"],
          };
        }

        function loadGasReport() {
          return new Promise((resolve, reject) => {
            const callback = `reportaAulaGas_${Date.now()}_${Math.round(Math.random() * 10000)}`;
            const script = document.createElement("script");
            const timer = setTimeout(() => cleanup(() => reject(new Error("Tiempo de espera agotado al consultar GAS"))), 10000);
            function cleanup(done) {
              clearTimeout(timer);
              delete window[callback];
              script.remove();
              done && done();
            }
            window[callback] = (payload) => cleanup(() => resolve(normalizeReport(payload)));
            script.onerror = () => cleanup(() => reject(new Error("No se pudo cargar el reporte GAS")));
            script.src = `${GAS_REPORT_URL}?api=report&callback=${encodeURIComponent(callback)}&v=${Date.now()}`;
            document.head.appendChild(script);
          });
        }

        async function getReport() {
          if (state.report) return state.report;
          try {
            state.report = await loadGasReport();
          } catch (error) {
            state.report = normalizeReport({ summaries: localRows(), generated_at: new Date().toISOString() });
          }
          return state.report;
        }

        function run(status = "done", message = "Reporte publico cargado desde GAS") {
          return {
            run_id: "gas-public-demo",
            status,
            message,
            created_at: new Date().toISOString(),
            finished_at: new Date().toISOString(),
            files: ["reporte_aula_moodle.xlsx", "resumen_estudiantes.csv", "riesgo_desercion.csv"],
          };
        }

        function auditRows() {
          return [
            { timestamp: new Date().toISOString(), username: "pages-public", method: "GET", path: "/api/reports/latest/dashboard", status_code: 200 },
            { timestamp: new Date().toISOString(), username: "gas-public", method: "JSONP", path: GAS_REPORT_URL, status_code: 200 },
          ];
        }

        function installApiShim() {
          window.fetch = async (input, init = {}) => {
            const requestUrl = typeof input === "string" ? input : input.url;
            const url = new URL(requestUrl, window.location.href);
            const path = url.pathname;
            const method = String(init.method || "GET").toUpperCase();
            if (path.endsWith("/api/defaults")) return json({ moodle_base_url: "https://www.virtual.facen.una.py/gradofacen", course_id: 1718, spreadsheet_id: "GAS publico demo", has_google_sink: true, has_basic_auth: false });
            if (path.endsWith("/api/reports/latest/dashboard")) return json(await getReport());
            if (path.endsWith("/api/automation") && method === "GET") return json(state.automation);
            if (path.endsWith("/api/automation") && method === "PUT") return json(Object.assign(state.automation, JSON.parse(init.body || "{}")));
            if (path.endsWith("/api/automation/run-now")) return json(run("done", "Corrida simulada en GitHub Pages; backend GAS disponible."));
            if (path.endsWith("/api/audit/access")) return json(auditRows());
            if (path.endsWith("/api/runs") && method === "GET") return json([run()]);
            if (path.endsWith("/api/runs") && method === "POST") return json(run("done", "Solicitud registrada en modo demostracion publica."));
            if (/\/api\/runs\/[^/]+\/dashboard$/.test(path)) return json(await getReport());
            if (/\/api\/runs\/[^/]+$/.test(path)) return json(run());
            if (/\/api\/runs\/[^/]+\/files\//.test(path)) return new Response("Archivo disponible en la version backend institucional.", { status: 200, headers: { "Content-Type": "text/plain; charset=utf-8" } });
            return nativeFetch(input, init);
          };
        }

        async function boot() {
          const response = await nativeFetch("app/static/index.html?v=20260611-gas-loader");
          const html = await response.text();
          const match = html.match(/<main class="shell">[\s\S]*?<\/main>/);
          if (!match) throw new Error("No se encontro la interfaz principal versionada.");
          document.body.innerHTML = match[0];
          installApiShim();
          const script = document.createElement("script");
          script.src = "app/static/app.js?v=20260611-gas-loader";
          document.body.appendChild(script);
        }

        boot().catch((error) => {
          document.getElementById("boot").innerHTML = `<header class="topbar"><div><h1>Reporta Aula Moodle</h1><p>${error.message}</p></div><span class="pill error">Error</span></header>`;
        });
      })();
    </script>
  </body>
</html>
