<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reporta Aula Moodle</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Reporta Aula Moodle</h1>
          <p id="sheetTarget">Hoja vinculada</p>
        </div>
        <button id="refreshRuns" class="icon-button" title="Actualizar corridas" aria-label="Actualizar corridas">↻</button>
      </section>

      <section class="workspace">
        <form id="runForm" class="panel">
          <div class="panel-head">
            <h2>Extracción</h2>
            <span id="googleState" class="pill">Sheets</span>
          </div>

          <label>
            Aula Moodle
            <input name="moodle_base_url" type="url" required />
          </label>

          <div class="grid-two">
            <label>
              Curso ID
              <input name="course_id" type="number" min="1" required />
            </label>
            <label>
              Usuario
              <input name="username" autocomplete="username" />
            </label>
          </div>

          <label>
            Contraseña
            <input name="password" type="password" autocomplete="current-password" />
          </label>

          <label>
            Nota
            <textarea name="notes" rows="3"></textarea>
          </label>

          <div class="form-row">
            <label class="checkline">
              <input name="sync_to_google" type="checkbox" checked />
              Sincronizar hoja
            </label>
            <button id="runButton" type="submit">Ejecutar</button>
          </div>
        </form>

        <section class="panel result-panel">
          <div class="panel-head">
            <h2>Estado</h2>
            <span id="currentStatus" class="pill muted">Listo</span>
          </div>
          <div id="statusMessage" class="status-message">Sin corrida activa.</div>
          <div id="files" class="file-list"></div>
        </section>
      </section>

      <section class="panel runs-panel">
        <div class="panel-head">
          <h2>Corridas</h2>
          <span id="runCount" class="pill muted">0</span>
        </div>
        <div id="runsTable" class="runs-table"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
